# 多语言配置中心
# 因为我们使用的是单语言（中文）模式，所以这里只保留了 [zh] 的配置
[zh]
    # 在页面中显示的语言名称
    label  = "简体中文"
    # 你博客展示用的最终标题
    title  = "lka blog"
    # 语言的排序权重
    weight = 1

    # 这里的设置会“覆盖”掉 params.toml 里面相同的设置
    [zh.params.sidebar]
        # 这是你侧边栏名字下方的个性签名。由于优先级高，在这里修改才会生效。
        subtitle = "记录生活，分享知识。"
